<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crash Out Notice</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #f4f4f4, #dfe9f3);
      padding: 24px;
    }
    .card {
      max-width: 720px;
      width: 100%;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.15);
      padding: 28px;
      text-align: center;
    }
    h1 {
      margin: 0 0 22px;
      font-size: clamp(1.6rem, 3vw, 2.5rem);
      line-height: 1.3;
      color: #1f2937;
    }
    img {
      width: 100%;
      max-width: 520px;
      height: auto;
      border-radius: 16px;
      border: 4px solid #e5e7eb;
      display: block;
      margin: 0 auto;
    }
    p {
      margin-top: 16px;
      color: #6b7280;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>I swear to God if I this becomes a group activity Imma crash out :(</h1>
    <img
      src="image.jpg"
      alt="A frustrated-looking dog wrapped in a blanket"
    />
    <p>I am so damned tired, why am I the one who is always getting blocked. This is so exhausting :(</p>
  </div>
</body>
</html>
